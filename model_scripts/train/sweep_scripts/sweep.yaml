program: train_peft.py
method: bayes
run_cap: 10
metric:
  name: eval_loss
  goal: minimize
parameters:
  learning_rate:
    distribution: "log_uniform_values"
    min: 5.0e-5
    max: 1.5e-4
  weight_decay:
    distribution: "uniform"
    min: 0.0
    max: 0.1

command:
  - ${env}
  - python
  - ${program}
  - --config 
  - ./configs/smol/smol_lab.yaml
  - ${args}