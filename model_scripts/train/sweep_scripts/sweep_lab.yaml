program: custom_peft.py
method: bayes
run_cap: 8
metric:
  name: eval_loss
  goal: minimize
parameters:
  learning_rate:
    distribution: "log_uniform_values"
    min: 1.0e-4
    max: 1.8e-4
  weight_decay:
    distribution: "uniform"
    min: 0.0
    max: 0.1

command:
  - ${env}
  - python
  - ${program}
  - --config 
  - ./configs/smolvlm_500M.yaml
  - ${args}