command:
- ${env}
- python
- ${program}
- --config
- ./configs/qwen7/qwen7_full_lora.yaml
- ${args}
count: 15
method: bayes
metric:
  goal: minimize
  name: eval_loss
parameters:
  learning_rate:
    distribution: log_uniform_values
    max: 0.00018
    min: 5e-05
  r:
    distribution: categorical
    values:
    - 64
    - 128
  weight_decay:
    distribution: uniform
    max: 0.1
    min: 0
program: train_unsloth.py